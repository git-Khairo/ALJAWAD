services:

  # ── MySQL ─────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      # Use dedicated MYSQL_* vars — do not map DB_USERNAME (often "root") into MYSQL_USER.
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aljawad}
      MYSQL_USER: ${MYSQL_USER:-aljawad}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Use the password from inside the container so it always matches initialized data.
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Laravel app (PHP-FPM + cron scheduler via entrypoint) ────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-aljawad}
      DB_USERNAME: ${MYSQL_USER:-aljawad}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      TELEGRAM_BOT_URL: http://coursebot:8080
    ports:
      # Expose Apache (HTTP) to the host so the server's nginx can reverse-proxy to it
      - "${APP_PORT:-8080}:80"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache

  # ── CourseBot (Telegram bot + FastAPI HTTP server on :8080) ──────────────────
  coursebot:
    build:
      context: ./CourseBot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./CourseBot/.env
    environment:
      API_PORT: "8080"
    volumes:
      - coursebot_data:/app/data
    expose:
      - "8080"

volumes:
  mysql_data:
  app_storage:
  app_bootstrap_cache:
  coursebot_data:
